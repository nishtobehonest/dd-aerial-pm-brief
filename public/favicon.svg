<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0f1a"/>
  <!-- arms -->
  <line x1="16" y1="16" x2="8" y2="8" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="24" y2="8" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="8" y2="24" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="24" y2="24" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- body -->
  <rect x="13.5" y="13.5" width="5" height="5" rx="1.5" fill="#00d4ff"/>
  <!-- propeller rings -->
  <circle cx="8" cy="8" r="3.5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="24" cy="8" r="3.5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="8" cy="24" r="3.5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="24" cy="24" r="3.5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
</svg>
